# Google Cloud Build — CI/CD pipeline
# Automatically builds, tests, and deploys to Cloud Run on every push
# https://cloud.google.com/build/docs/build-config-file-schema

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/election-explorer:$COMMIT_SHA', '.']
    id: 'build-image'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/election-explorer:$COMMIT_SHA']
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Deploy to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'election-explorer'
      - '--image'
      - 'gcr.io/$PROJECT_ID/election-explorer:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--port'
      - '8080'
    id: 'deploy-cloud-run'
    waitFor: ['push-image']

# Store built images in GCR
images:
  - 'gcr.io/$PROJECT_ID/election-explorer:$COMMIT_SHA'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout for the entire build
timeout: '600s'
